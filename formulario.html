<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page">
  <main class="card register-card">
    <form action="#">
      <section class="section">
        <h1 class="section-title">Personal Data</h1>

        <div class="field-grid">
          <label class="field compact-field">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <rect x="5" y="3" width="14" height="18" rx="2"></rect>
                <path d="M9 8h6"></path>
                <path d="M12 12a2.25 2.25 0 1 0 0-4.5 2.25 2.25 0 0 0 0 4.5z"></path>
                <path d="M8.5 17a3.5 3.5 0 0 1 7 0"></path>
              </svg>
            </span>
            <input type="text" placeholder="Full Name" aria-label="Full Name">
          </label>

          <label class="field compact-field">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                <path d="M7 9h10"></path>
                <path d="M7 13h5"></path>
                <path d="M15.5 13h1"></path>
              </svg>
            </span>
            <input type="text" placeholder="CPF" aria-label="CPF">
          </label>

          <label class="field compact-field select-field">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <rect x="4" y="5" width="16" height="15" rx="2"></rect>
                <path d="M8 3.5v4"></path>
                <path d="M16 3.5v4"></path>
                <path d="M4 9.5h16"></path>
              </svg>
            </span>
            <select aria-label="Date of Birth">
              <option>Date of Birth</option>
            </select>
          </label>

          <label class="field compact-field">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M7.8 4.8a2 2 0 0 1 2.8 0l1.5 1.5a2 2 0 0 1 0 2.8l-1.1 1.1a14.1 14.1 0 0 0 2.8 2.8l1.1-1.1a2 2 0 0 1 2.8 0l1.5 1.5a2 2 0 0 1 0 2.8l-.8.8a3 3 0 0 1-3 .8c-2.5-.8-5.3-3-8.1-5.8S5 9 4.2 6.6a3 3 0 0 1 .8-3z"></path>
              </svg>
            </span>
            <input type="tel" placeholder="Phone Number" aria-label="Phone Number">
          </label>
        </div>

        <div class="inline-pair">
          <div class="inline-item">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M12 21s-6-3.4-6-9.3V6.5L12 4l6 2.5v5.2C18 17.6 12 21 12 21z"></path>
                <path d="m9.5 12 1.5 1.5 3.5-3.5"></path>
              </svg>
            </span>
            <span>Password</span>
          </div>

          <div class="inline-item">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M7 4h8l3 3v13H7z"></path>
                <path d="M15 4v3h3"></path>
                <path d="M10 12h5"></path>
                <path d="M10 16h4"></path>
              </svg>
            </span>
            <span>Pastwoll</span>
          </div>
        </div>
      </section>

      <section class="section">
        <h2 class="section-title">Address</h2>

        <div class="field-grid">
          <label class="field compact-field">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M4 8h16"></path>
                <rect x="3" y="5" width="6" height="6" rx="1"></rect>
                <rect x="15" y="5" width="6" height="6" rx="1"></rect>
                <path d="M8 15h8"></path>
                <circle cx="7" cy="17" r="2"></circle>
                <circle cx="17" cy="17" r="2"></circle>
              </svg>
            </span>
            <input type="text" placeholder="ZIP Code (CEP)" aria-label="ZIP Code (CEP)">
          </label>

          <label class="field compact-field">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M12 20s5-3.8 5-8.4A5 5 0 0 0 7 11.6C7 16.2 12 20 12 20z"></path>
                <circle cx="12" cy="10.5" r="2.5"></circle>
              </svg>
            </span>
            <input type="text" placeholder="Street" aria-label="Street">
          </label>

          <label class="field compact-field">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <rect x="4" y="5" width="16" height="14" rx="2"></rect>
                <path d="M8 3.5v3"></path>
                <path d="M16 3.5v3"></path>
                <path d="M4 9.5h16"></path>
                <path d="M8 13h3"></path>
              </svg>
            </span>
            <input type="text" placeholder="Ifalcme" aria-label="Ifalcme">
          </label>

          <label class="field compact-field">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M12 20h6"></path>
                <path d="M15 17V11a3 3 0 1 0-6 0v6"></path>
                <path d="M7 17h10"></path>
                <path d="M10 20a2 2 0 0 0 4 0"></path>
              </svg>
            </span>
            <input type="text" placeholder="City" aria-label="City">
          </label>
        </div>
      </section>

      <section class="section">
        <h2 class="section-title">Professional Data</h2>

        <div class="field-grid">
          <label class="field compact-field">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M5 7h14l-1.2 5.6a2 2 0 0 1-2 1.6H8.2a2 2 0 0 1-2-1.6z"></path>
                <path d="M8 14h8"></path>
                <path d="M9 18a1.5 1.5 0 1 0 0 .1z"></path>
                <path d="M16 18a1.5 1.5 0 1 0 0 .1z"></path>
                <path d="M6 7 5.2 4H3"></path>
              </svg>
            </span>
            <input type="text" placeholder="Company" aria-label="Company">
          </label>

          <label class="field compact-field">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M8 9V7a4 4 0 1 1 8 0v2"></path>
                <rect x="6" y="9" width="12" height="11" rx="2"></rect>
                <circle cx="12" cy="6" r="1.5"></circle>
              </svg>
            </span>
            <input type="text" placeholder="Job Title" aria-label="Job Title">
          </label>

          <label class="field compact-field">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <rect x="4" y="7" width="16" height="12" rx="2"></rect>
                <path d="M9 7V5.5A1.5 1.5 0 0 1 10.5 4h3A1.5 1.5 0 0 1 15 5.5V7"></path>
                <path d="M4 12h16"></path>
              </svg>
            </span>
            <input type="text" placeholder="Job Title" aria-label="Job Title 2">
          </label>

          <label class="field compact-field select-field linkedin-field">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <rect x="2.5" y="2.5" width="19" height="19" rx="2.5" fill="currentColor" stroke="none"></rect>
                <path d="M8 10v7" stroke="#ffffff"></path>
                <path d="M8 7.5h.01" stroke="#ffffff" stroke-width="2.3"></path>
                <path d="M12 17v-4.1c0-1.2.7-2 1.8-2s1.7.8 1.7 2.1V17" stroke="#ffffff"></path>
                <path d="M12 12.2v-2.2h3.6" stroke="#ffffff"></path>
              </svg>
            </span>
            <select aria-label="LinkedIn URL">
              <option>LinkedIn_URL</option>
            </select>
          </label>
        </div>
      </section>

      <button class="primary-button register-button" type="button">Create Account</button>
    </form>
  </main>
</body>
</html>
